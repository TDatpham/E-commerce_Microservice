services:
  # 1. Discovery Service (Eureka)
  - type: web
    name: discovery-service
    runtime: docker # Đổi thành runtime để tương thích tốt hơn
    dockerContext: backend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: SERVICE_NAME
        value: discovery-service
      - key: PORT
        value: "8761"
      - key: SERVER_PORT
        value: "8761"

  # 2. API Gateway
  - type: web
    name: api-gateway
    runtime: docker
    dockerContext: backend
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: SERVICE_NAME
        value: api-gateway
      - key: PORT
        value: "8080"
      - key: SERVER_PORT
        value: "8080"
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: http://discovery-service:8761/eureka/
      - key: ALLOWED_ORIGINS
        sync: false

  # 3. Product Service
  - type: web
    name: product-service
    runtime: docker
    dockerContext: backend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: SERVICE_NAME
        value: product-service
      - key: PORT
        value: "8081"
      - key: SERVER_PORT
        value: "8081"
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: http://discovery-service:8761/eureka/
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: SPRING_KAFKA_BOOTSTRAP_SERVERS
        value: localhost:9092

  # 4. User Service
  - type: web
    name: user-service
    runtime: docker
    dockerContext: backend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: SERVICE_NAME
        value: user-service
      - key: PORT
        value: "8082"
      - key: SERVER_PORT
        value: "8082"
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: http://discovery-service:8761/eureka/
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false

  # 5. Order Service
  - type: web
    name: order-service
    runtime: docker
    dockerContext: backend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: SERVICE_NAME
        value: order-service
      - key: PORT
        value: "8083"
      - key: SERVER_PORT
        value: "8083"
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: http://discovery-service:8761/eureka/
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
